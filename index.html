<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurikulum SD Negeri 1 Godegan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --toolbar-bg: rgba(24, 24, 24, 0.85);
            --accent-color: #3498db;
            --hover-bg: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            touch-action: none; /* Mencegah geser browser bawaan di mobile */
        }

        #viewer-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
        }

        /* Toolbar Elegan & Glassmorphism */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: var(--toolbar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
            transition: padding 0.3s ease;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .school-logo {
            height: 48px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .title-group {
            display: flex;
            flex-direction: column;
        }

        .toolbar .main-title {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-color);
        }

        .toolbar .sub-title {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 1px;
        }

        .controls-center {
            display: flex;
            align-items: center;
            gap: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .page-info {
            font-size: 0.95rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 18px;
            border-radius: 20px;
            min-width: 85px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .actions-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover:not(:disabled) {
            background: var(--hover-bg);
            transform: scale(1.05);
        }

        button:active:not(:disabled) {
            transform: scale(0.95);
        }

        button.nav-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        button:disabled {
            color: rgba(255, 255, 255, 0.15);
            cursor: not-allowed;
            background: none;
            border-color: transparent;
        }

        /* Area Canvas Dioptimalkan Maksimal */
        #canvas-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 15px; /* Sedikit padding agar estetik di mode normal */
            position: relative;
            background: radial-gradient(circle, #252525 0%, #121212 100%);
            transition: padding 0.3s ease;
        }

        canvas {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.65);
            border-radius: 6px;
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        /* Optimasi Tampilan Penuh (Edge-to-Edge) */
        #viewer-container.is-fullscreen #canvas-wrapper {
            padding: 0; /* Maksimalkan ukuran PDF mentok ke ujung layar */
        }
        
        #viewer-container.is-fullscreen .toolbar {
            padding: 8px 24px; /* Toolbar lebih tipis saat fullscreen */
        }

        #loading-bar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }
        
        .fa-spinner {
            animation: spin 1s linear infinite;
            color: var(--accent-color);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Responsif untuk Smartphone */
        @media (max-width: 768px) {
            .logo-section .title-group {
                display: none;
            }
            .controls-center {
                position: static;
                transform: none;
            }
            .toolbar {
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <div class="toolbar">
            <div class="logo-section">
                <img src="logo.png" alt="Logo Sekolah" class="school-logo">
                <div class="title-group">
                    <span class="main-title">KURIKULUM SD NEGERI 1 GODEGAN</span>
                    <span class="sub-title">Tahun Ajaran 2026/2027</span>
                </div>
            </div>

            <div class="controls-center">
                <button id="prev-btn" class="nav-btn" title="Halaman Sebelumnya"><i class="fas fa-chevron-left"></i></button>
                <div class="page-info"><span id="page-num">0</span> / <span id="page-count">0</span></div>
                <button id="next-btn" class="nav-btn" title="Halaman Selanjutnya"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="actions-right">
                <button id="fullscreen-btn" title="Layar Penuh"><i class="fas fa-expand"></i></button>
            </div>
        </div>

        <div id="canvas-wrapper">
            <div id="loading-bar"><i class="fas fa-spinner fa-lg"></i> Memuat Dokumen...</div>
            <canvas id="pdf-render" style="display: none;"></canvas>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const url = 'kurikulum.pdf'; 

        let pdfDoc = null,
            pageNum = 1,
            pageRendering = false,
            pageNumPending = null;
            
        const canvas = document.getElementById('pdf-render'),
              ctx = canvas.getContext('2d'),
              wrapper = document.getElementById('canvas-wrapper'),
              viewer = document.getElementById('viewer-container'),
              fsBtn = document.getElementById('fullscreen-btn');

        // Render Halaman dengan Optimasi Ketajaman Tinggi (High-DPI)
        function renderPage(num) {
            pageRendering = true;
            
            pdfDoc.getPage(num).then(function(page) {
                // Hitung area bersih pembungkus
                const paddingSpace = viewer.classList.contains('is-fullscreen') ? 0 : 30;
                const clientWidth = wrapper.clientWidth - paddingSpace;
                const clientHeight = wrapper.clientHeight - paddingSpace;

                const viewportUnscaled = page.getViewport({ scale: 1 });
                const scaleX = clientWidth / viewportUnscaled.width;
                const scaleY = clientHeight / viewportUnscaled.height;
                
                // Menentukan skala pas agar seluruh halaman PDF masuk layar tanpa terpotong
                const finalScale = Math.min(scaleX, scaleY);
                const viewport = page.getViewport({ scale: finalScale });

                // OPTIMASI KETAJAMAN: Mengalikan ukuran internal canvas dengan pixel ratio perangkat
                const dpr = window.devicePixelRatio || 1;
                canvas.height = viewport.height * dpr;
                canvas.width = viewport.width * dpr;

                // Kembalikan ukuran CSS ke ukuran asli agar pas di container
                canvas.style.width = viewport.width + 'px';
                canvas.style.height = viewport.height + 'px';

                // Skala konteks gambar agar mengikuti resolusi tinggi perangkat
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                
                const renderTask = page.render(renderContext);

                renderTask.promise.then(function() {
                    pageRendering = false;
                    document.getElementById('loading-bar').style.display = 'none';
                    canvas.style.display = 'block';
                    
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });

            document.getElementById('page-num').textContent = num;
            updateButtons();
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function onPrevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        }

        function onNextPage() {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        }

        function updateButtons() {
            document.getElementById('prev-btn').disabled = pageNum <= 1;
            document.getElementById('next-btn').disabled = pageNum >= pdfDoc.numPages;
        }

        document.getElementById('prev-btn').addEventListener('click', onPrevPage);
        document.getElementById('next-btn').addEventListener('click', onNextPage);

        // Membuka File PDF
        pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        }).catch(err => {
            document.getElementById('loading-bar').innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff4757;"></i> Gagal memuat file PDF.`;
        });

        // ===================================================
        // OPTIMASI FULLSCREEN & AUTOMATIC LANDSCAPE LOCK
        // ===================================================
        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                viewer.requestFullscreen().then(() => {
                    // Paksa orientasi layar menjadi landscape jika didukung perangkat (Mobile/Tablet)
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(err => {
                            console.log('Kunci orientasi diabaikan/tidak didukung perangkat desktop.');
                        });
                    }
                }).catch(err => {
                    console.log(`Gagal masuk Fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fsBtn.innerHTML = '<i class="fas fa-compress"></i>';
                viewer.classList.add('is-fullscreen');
            } else {
                fsBtn.innerHTML = '<i class="fas fa-expand"></i>';
                viewer.classList.remove('is-fullscreen');
                // Kembalikan orientasi layar ke bawaan saat keluar dari fullscreen
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
            // Render ulang secara instan agar PDF menyesuaikan ukuran resolusi baru penuh
            setTimeout(() => {
                if(pdfDoc) renderPage(pageNum);
            }, 150);
        });

        // ===================================================
        // INTEGRASI TOMBOL KEYBOARD (LAPTOP/PC)
        // ===================================================
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                onNextPage();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                onPrevPage();
            }
        });

        // ===================================================
        // INTEGRASI DIGESER / SWIPE (IFP & LAYAR SENTUH)
        // ===================================================
        let touchstartX = 0;
        let touchendX = 0;

        wrapper.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});

        wrapper.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const threshold = 60; // Jarak usap minimum dalam pixel
            if (touchendX < touchstartX - threshold) onNextPage();
            if (touchendX > touchstartX + threshold) onPrevPage();
        }

        // Responsif Otomatis saat Jendela Diubah
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if(pdfDoc && !pageRendering) {
                    queueRenderPage(pageNum);
                }
            }, 150);
        });
    </script>
</body>
</html>
