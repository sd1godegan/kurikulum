<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurikulum SD Negeri 1 Godegan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --toolbar-bg: rgba(30, 30, 30, 0.9);
            --accent-color: #3498db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        #viewer-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
        }

        /* Toolbar Modern dengan Logo */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--toolbar-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .school-logo {
            height: 50px; /* Sesuaikan ukuran logo */
            width: auto;
            object-fit: contain;
        }

        .title-group {
            display: flex;
            flex-direction: column;
        }

        .toolbar .main-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-color);
        }

        .toolbar .sub-title {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
        }

        .controls-center {
            display: flex;
            align-items: center;
            gap: 15px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .page-info {
            font-size: 1rem;
            font-weight: 500;
            background: rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 20px;
            min-width: 80px;
            text-align: center;
        }

        .actions-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: rgba(255,255,255,0.15);
        }

        button.nav-btn {
            background: rgba(255,255,255,0.05);
        }

        button:disabled {
            color: rgba(255,255,255,0.2);
            cursor: not-allowed;
            background: none;
        }

        #canvas-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 20px;
            position: relative;
        }

        canvas {
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border-radius: 4px;
            max-width: 100%;
            max-height: 100%;
            transition: opacity 0.3s ease;
        }

        #loading-bar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.8);
        }
        
        .fa-spinner {
            animation: spin 1s linear infinite;
            color: var(--accent-color);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Responsif untuk Mobile */
        @media (max-width: 768px) {
            .logo-section .title-group {
                display: none; /* Sembunyikan teks judul di layar kecil */
            }
            .controls-center {
                position: static;
                transform: none;
            }
            .toolbar {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <div class="toolbar">
            <div class="logo-section">
                <img src="logo.png" alt="Logo Sekolah" class="school-logo">
                <div class="title-group">
                    <span class="main-title">KURIKULUM SD NEGERI 1 GODEGAN</span>
                    <span class="sub-title">Tahun Ajaran 2026/2027</span>
                </div>
            </div>

            <div class="controls-center">
                <button id="prev-btn" class="nav-btn" title="Halaman Sebelumnya"><i class="fas fa-chevron-left"></i></button>
                <div class="page-info"><span id="page-num">0</span> / <span id="page-count">0</span></div>
                <button id="next-btn" class="nav-btn" title="Halaman Selanjutnya"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="actions-right">
                <button id="fullscreen-btn" title="Layar Penuh"><i class="fas fa-expand"></i></button>
            </div>
        </div>

        <div id="canvas-wrapper">
            <div id="loading-bar"><i class="fas fa-spinner fa-lg"></i> Memuat Dokumen...</div>
            <canvas id="pdf-render" style="display: none;"></canvas>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Konfigurasi File
        const url = 'kurikulum.pdf'; 
        // const logoUrl = 'logo.png'; // Tentukan nama file logo di sini

        let pdfDoc = null,
            pageNum = 1,
            pageRendering = false,
            pageNumPending = null;
            
        const canvas = document.getElementById('pdf-render'),
              ctx = canvas.getContext('2d'),
              wrapper = document.getElementById('canvas-wrapper');

        function renderPage(num) {
            pageRendering = true;
            
            pdfDoc.getPage(num).then(function(page) {
                const viewportUnscaled = page.getViewport({ scale: 1 });
                const scaleX = (wrapper.clientWidth - 40) / viewportUnscaled.width;
                const scaleY = (wrapper.clientHeight - 40) / viewportUnscaled.height;
                
                const finalScale = Math.min(scaleX, scaleY);
                const viewport = page.getViewport({ scale: finalScale });

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                
                const renderTask = page.render(renderContext);

                renderTask.promise.then(function() {
                    pageRendering = false;
                    document.getElementById('loading-bar').style.display = 'none';
                    canvas.style.display = 'block';
                    
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });

            document.getElementById('page-num').textContent = num;
            updateButtons();
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function onPrevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        }

        function onNextPage() {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        }

        function updateButtons() {
            document.getElementById('prev-btn').disabled = pageNum <= 1;
            document.getElementById('next-btn').disabled = pageNum >= pdfDoc.numPages;
        }

        document.getElementById('prev-btn').addEventListener('click', onPrevPage);
        document.getElementById('next-btn').addEventListener('click', onNextPage);

        pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        }).catch(err => {
            document.getElementById('loading-bar').innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff4757;"></i> Gagal memuat PDF.`;
        });

        // Fullscreen
        const viewer = document.getElementById('viewer-container');
        const fsBtn = document.getElementById('fullscreen-btn');

        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                viewer.requestFullscreen().catch(err => {
                    console.log(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fsBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                fsBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
            setTimeout(() => {
                if(pdfDoc) renderPage(pageNum);
            }, 200);
        });

        // Swipe
        let touchstartX = 0;
        let touchendX = 0;

        wrapper.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});

        wrapper.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const threshold = 50;
            if (touchendX < touchstartX - threshold) onNextPage();
            if (touchendX > touchstartX + threshold) onPrevPage();
        }

        window.addEventListener('resize', () => {
            if(pdfDoc && !pageRendering) {
                queueRenderPage(pageNum);
            }
        });
    </script>
</body>
</html>
