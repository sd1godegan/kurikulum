<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurikulum SD Negeri 1 Godegan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --toolbar-bg: rgba(24, 24, 24, 0.85);
            --accent-color: #3498db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            touch-action: none;
        }

        #viewer-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            position: relative;
        }

        /* Toolbar Atas */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: var(--toolbar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
            transition: padding 0.3s ease;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .school-logo {
            height: 48px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .title-group {
            display: flex;
            flex-direction: column;
        }

        .toolbar .main-title {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-color);
        }

        .toolbar .sub-title {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 1px;
        }

        /* Indikator Halaman di Tengah Toolbar */
        .controls-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
        }

        .page-info {
            font-size: 0.95rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 20px;
            border-radius: 20px;
            min-width: 90px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
        }

        .actions-right {
            display: flex;
            align-items: center;
            z-index: 11;
        }

        button {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #fullscreen-btn {
            font-size: 1.25rem;
            transition: all 0.2s ease;
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }

        /* Area Utama Dokumen */
        #canvas-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 20px 80px; 
            position: relative;
            background: radial-gradient(circle, #252525 0%, #121212 100%);
            transition: padding 0.3s ease;
        }

        canvas {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.65);
            border-radius: 6px;
            max-width: 100%;
            max-height: 100%;
            display: block;
            z-index: 1;
        }

        /* ========================================= */
        /* TOMBOL NAVIGASI SAMPING MINIMALIS         */
        /* ========================================= */
        .side-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px; /* Area sentuh tetap lebar agar mudah dipencet */
            height: 80px;
            background: transparent; /* Lingkaran dihilangkan */
            border: none;
            color: rgba(255, 255, 255, 0.6); /* Warna ikon sedikit redup saat diam */
            font-size: 3rem; /* Ukuran ikon diperbesar */
            z-index: 5;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8); /* Bayangan kuat agar kontras dengan background putih PDF */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            visibility: visible;
        }

        .side-nav-btn.left {
            left: 15px;
        }

        .side-nav-btn.right {
            right: 15px;
        }

        .side-nav-btn:hover:not(:disabled) {
            color: #ffffff; /* Ikon menjadi putih terang saat disentuh/di-hover */
            transform: translateY(-50%) scale(1.2); /* Membesar sedikit */
            background: transparent;
            text-shadow: 0 6px 20px rgba(0, 0, 0, 0.9);
        }

        .side-nav-btn:active:not(:disabled) {
            transform: translateY(-50%) scale(0.95);
        }

        .side-nav-btn:disabled {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Optimasi Tampilan Penuh */
        #viewer-container.is-fullscreen #canvas-wrapper {
            padding: 0 70px; 
        }
        
        #viewer-container.is-fullscreen .toolbar {
            padding: 8px 24px;
        }

        #loading-bar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            z-index: 2;
        }
        
        .fa-spinner {
            animation: spin 1s linear infinite;
            color: var(--accent-color);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Responsif untuk Smartphone */
        @media (max-width: 768px) {
            .logo-section .title-group {
                display: none;
            }
            .toolbar {
                padding: 10px 15px;
            }
            #canvas-wrapper {
                padding: 15px 10px;
            }
            .side-nav-btn {
                width: 40px;
                font-size: 2rem;
                color: rgba(255, 255, 255, 0.8);
            }
            .side-nav-btn.left { left: 5px; }
            .side-nav-btn.right { right: 5px; }
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <div class="toolbar">
            <div class="logo-section">
                <img src="logo.png" alt="Logo Sekolah" class="school-logo">
                <div class="title-group">
                    <span class="main-title">KURIKULUM SD NEGERI 1 GODEGAN</span>
                    <span class="sub-title">Tahun Ajaran 2026/2027</span>
                </div>
            </div>

            <div class="controls-center">
                <div class="page-info"><span id="page-num">0</span> / <span id="page-count">0</span></div>
            </div>

            <div class="actions-right">
                <button id="fullscreen-btn" title="Layar Penuh"><i class="fas fa-expand"></i></button>
            </div>
        </div>

        <div id="canvas-wrapper">
            <button id="prev-btn" class="side-nav-btn left" title="Halaman Sebelumnya"><i class="fas fa-chevron-left"></i></button>
            <button id="next-btn" class="side-nav-btn right" title="Halaman Selanjutnya"><i class="fas fa-chevron-right"></i></button>

            <div id="loading-bar"><i class="fas fa-spinner fa-lg"></i> Memuat Dokumen...</div>
            <canvas id="pdf-render" style="display: none;"></canvas>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const url = 'kurikulum.pdf'; 

        let pdfDoc = null,
            pageNum = 1,
            pageRendering = false,
            pageNumPending = null;
            
        const canvas = document.getElementById('pdf-render'),
              ctx = canvas.getContext('2d'),
              wrapper = document.getElementById('canvas-wrapper'),
              viewer = document.getElementById('viewer-container'),
              fsBtn = document.getElementById('fullscreen-btn'),
              prevBtn = document.getElementById('prev-btn'),
              nextBtn = document.getElementById('next-btn');

        function renderPage(num) {
            pageRendering = true;
            
            pdfDoc.getPage(num).then(function(page) {
                const isFS = viewer.classList.contains('is-fullscreen');
                const isMobile = window.innerWidth <= 768;
                
                let paddingX = isMobile ? 20 : (isFS ? 140 : 160);
                let paddingY = isFS ? 0 : 40;

                const clientWidth = wrapper.clientWidth - paddingX;
                const clientHeight = wrapper.clientHeight - paddingY;

                const viewportUnscaled = page.getViewport({ scale: 1 });
                const scaleX = clientWidth / viewportUnscaled.width;
                const scaleY = clientHeight / viewportUnscaled.height;
                
                const finalScale = Math.min(scaleX, scaleY);
                const viewport = page.getViewport({ scale: finalScale });

                const dpr = window.devicePixelRatio || 1;
                canvas.height = viewport.height * dpr;
                canvas.width = viewport.width * dpr;

                canvas.style.width = viewport.width + 'px';
                canvas.style.height = viewport.height + 'px';

                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                
                const renderTask = page.render(renderContext);

                renderTask.promise.then(function() {
                    pageRendering = false;
                    document.getElementById('loading-bar').style.display = 'none';
                    canvas.style.display = 'block';
                    
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });

            document.getElementById('page-num').textContent = num;
            updateButtons();
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function onPrevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        }

        function onNextPage() {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        }

        function updateButtons() {
            prevBtn.disabled = pageNum <= 1;
            nextBtn.disabled = pageNum >= pdfDoc.numPages;
        }

        prevBtn.addEventListener('click', onPrevPage);
        nextBtn.addEventListener('click', onNextPage);

        pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        }).catch(err => {
            document.getElementById('loading-bar').innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ff4757;"></i> Gagal memuat file PDF.`;
        });

        // Fullscreen
        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                viewer.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(err => {
                            console.log('Kunci orientasi diabaikan/tidak didukung perangkat desktop.');
                        });
                    }
                }).catch(err => {
                    console.log(`Gagal masuk Fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fsBtn.innerHTML = '<i class="fas fa-compress"></i>';
                viewer.classList.add('is-fullscreen');
            } else {
                fsBtn.innerHTML = '<i class="fas fa-expand"></i>';
                viewer.classList.remove('is-fullscreen');
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
            setTimeout(() => {
                if(pdfDoc) renderPage(pageNum);
            }, 150);
        });

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                onNextPage();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                onPrevPage();
            }
        });

        // Swipe
        let touchstartX = 0;
        let touchendX = 0;

        wrapper.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});

        wrapper.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const threshold = 60; 
            if (touchendX < touchstartX - threshold) onNextPage();
            if (touchendX > touchstartX + threshold) onPrevPage();
        }

        // Resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if(pdfDoc && !pageRendering) {
                    queueRenderPage(pageNum);
                }
            }, 150);
        });
    </script>
</body>
</html>
